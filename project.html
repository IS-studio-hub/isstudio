<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IS - Experience House</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/scrollbars.css">

  <!-- GSAP -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

  <style>
    :root{
      --bg: #F7E491;
      --fg: #CE4127;
      --muted: #CE4127;
      --border: rgba(206, 65, 39,1);
      --dot: #CE4127;
      --dot-glow: rgba(134, 59, 25, 1);
      --accent-img: url('https://images.unsplash.com/photo-1501785888041-af3ef285b470?q=80&w=1600&auto=format&fit=crop');
      --gutter: clamp(16px, 6vw, 140px);
      --toast-bg: rgba(255,255,255,.08);

      /* vh fallback var for older iOS */
      --vh: 1vh;
    }

    html {
      scroll-behavior: smooth;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans", "Liberation Sans", sans-serif;
      overflow: clip;
    }

    .screen {
      position: relative;
      width: 100vw;

      /* viewport height fixes */
      height: 100vh;
      height: 100svh;
      height: 100dvh;
      height: calc(var(--vh) * 100);

      overflow: hidden;
      background: var(--bg);
      isolation: isolate;
    }

    /* CENTERED content area */
    .center{
      width: 100vw;
      position: absolute;
      inset: 0;
      display: grid;
      align-items: center;
      justify-items: center;
      text-align: center;
      pointer-events: none;
    }
    .stack {
      display: flex;
      gap: clamp(1rem, 3vh, 2rem);
      align-items: stretch;
      justify-items: center;
      text-align: center;
      pointer-events: auto;
      width: -webkit-fill-available;
      height: 100%;
      padding: 140px 32px 32px 0;
      overflow-y: auto;
      overflow-x: hidden;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      scroll-padding-top: 140px;
    }

    @media (max-width: 480px) {
      .stack {
        padding: 140px 16px 16px 16px;
      }
    }
    
    .eyebrow {
      position: relative; z-index: 2;
      letter-spacing: .18em;
      font-size: clamp(.7rem, 1.2vw, 1rem);
      text-transform: uppercase;
      color: var(--muted);
      pointer-events: auto;
    }

    /* Project content area */
    .project-content {
      height: fit-content;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 32px;
      align-items: center;
      padding-top: 32px;
      padding-bottom: 120px;
    }

    .project-video {
      width: 100%;
      /* height: 600px; */
      border-radius: 14px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 10px 24px rgb(0 0 0 / 30%);
      flex-shrink: 0;
    }

    .project-video video {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
    }

    .title-p {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 32px;
      text-align: left;
      padding: 100px 0 150px 0;
    }
    
    /* Ensure video is visible */
    .project-video video:not([src]) {
      /* display: none; */
    }
    
    /* Responsive video height */
    @media (max-width: 768px) {
      .project-video {
        /* height: 400px; */
      }
    }
    
    @media (max-width: 480px) {
      .project-video {
        /* height: 300px; */
      }
    }

    .project-title {
      font-size: clamp(3rem, 8vw, 8rem);
      font-weight: 700;
      line-height: 0.9;
      letter-spacing: -0.02em;
      text-transform: uppercase;
      color: #863B19;
      margin: 0;
      text-align: left;
      align-self: flex-start;
      width: 100%;
    }

    .project-number {
      font-size: clamp(1rem, 2vw, 1.5rem);
      font-weight: 500;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .project-tagline {
      font-size: clamp(1.25rem, 2vw, 1.75rem);
      font-weight: 500;
      line-height: 1.4;
      color: #863B19;
      margin: 0.5rem 0 1rem 0;
      text-align: left;
      align-self: flex-start;
      width: 100%;
      opacity: 0.85;
      font-style: italic;
    }

    .project-description {
      font-size: clamp(1rem, 1.5vw, 1.25rem);
      line-height: 1.6;
      color: #863B19;
      max-width: 600px;
      opacity: 0.9;
      text-align: left;
      align-self: flex-start;
      width: 100%;
    }

    /* top-left showreel */
    .showreel {
      position: absolute; left: clamp(16px, 2vw, 32px); top: clamp(14px, 2.2vh, 28px);
      display: inline-flex; align-items: center; gap: .9rem;
      color: var(--fg);
      cursor: none !important;
      pointer-events: auto;
      user-select: none;
      text-decoration: none;
      z-index: 3;
    }
    /* Spin animation for icon on page load */
    @keyframes spin180 {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(180deg);
      }
    }

    /* Hover animation for play icon - move right then come back from left */
    @keyframes playIconHover {
      0% {
        transform: translateX(0);
      }
      50% {
        transform: translateX(20px);
      }
      51% {
        transform: translateX(-20px);
      }
      100% {
        transform: translateX(0);
      }
    }

    .showreel .icon {
      width: 46px; height: 46px; border-radius: 10px;
      position: relative; display: grid; place-items: center;
      outline: 1.5px solid var(--border);
      background-color: #f7e491;
      transition: transform .15s ease;
      animation: spin180 0.6s ease-out forwards;
    }
    .showreel .icon::before {
      content: ""; position: absolute; inset: 0;
      border: 1.5px dashed rgba(206, 65, 39,.25);
      border-radius: 10px;
      transform: scale(.86);
    }
    .showreel .play {
      width: 0; height: 0;
      border-left: 10px solid var(--fg);
      border-top: 7px solid transparent;
      border-bottom: 7px solid transparent;
      margin-left: 2px;
      transition: none;
    }

    .showreel:hover .play {
      animation: playIconHover 0.6s ease-out;
    }
    .showreel span.label{
      font-weight: 600;
      letter-spacing: .06em;
      font-size: clamp(.75rem, 1.1vw, 1rem);
      text-transform: uppercase;
      opacity: .95;
    }
    .showreel:hover .icon{ 
      transform: rotate(180deg) scale(1.04); 
    }

    /* bottom-left: logo + pills */
    .bottom-left {
      margin-bottom: 24px;
      position: absolute; left: clamp(12px, 2.4vw, 48px); bottom: clamp(14px, 2.2vh, 28px);
      display: flex; align-items: flex-end; gap: 24px;
      z-index: 2;
      pointer-events: auto;
      cursor: none !important;
    }
    .logo-svg { width: 36px; height: auto; display: block; }

    .pills { display: flex; gap: clamp(10px, 1.2vw, 16px); flex-wrap: wrap; }
    .pill {
      pointer-events: auto;
      display: inline-flex;
      align-items: center;
      gap: .6rem;
      padding: .65rem 1.1rem;
      border: 1.6px solid var(--fg);
      border-radius: 999px;
      background: #f7e491;
      color: var(--fg);
      font-weight: 600;
      letter-spacing: .05em;
      font-size: clamp(.72rem, .95vw, .9rem);
      text-transform: uppercase;
      text-decoration: none;
      transition: background .2s ease, color .2s ease, transform .12s ease, border-color .2s ease;
      cursor: none !important;
    }
    .pill .dot{ width: .45rem; height: .45rem; border-radius: 50%; background: var(--fg); }
    .pill:hover { background: var(--fg); color: var(--bg); transform: translateY(-1px); }
    .pill:hover .dot{ background: var(--bg); }

    /* bottom-right rock wedge */
    .wedge {
      position: absolute; right: -6vw; bottom: -10vh;
      width: min(64vw, 1100px);
      height: min(42vh, 480px);
      background-image: var(--accent-img);
      background-size: cover; background-position: center;
      filter: grayscale(1) contrast(1.2) brightness(.9);
      opacity: .9;
      clip-path: polygon(22% 0, 100% 0, 100% 100%, 0 100%, 8% 62%);
      transform: rotate(-2deg);
      pointer-events: none;
      z-index: 0;
    }

    :focus-visible { outline: 2px dashed #fff; outline-offset: 3px; }

    /* under 520px tweaks */
    @media (max-width: 520px){
      :root{ --gutter: clamp(12px, 5vw, 24px); }
      .showreel span.label{ display:none; }
    }

    /* under 470px → stack pills vertically ABOVE the logo */
    @media (max-width: 470px){
    	.logo-svg { width: 48px; }
      .bottom-left{
        margin-bottom: 0;
        flex-direction: column-reverse;
        align-items: flex-start;
        gap: 44px;
      }
      .pills{
        display: flex;
        flex-direction: column;
        flex-wrap: nowrap;
        gap: 8px;
      }
      .pill{
        padding: .5rem .8rem;
        font-size: .8rem;
        letter-spacing: .03em;
      }
    }

    /* Hide the toast completely */
    .toast { display: none !important; }

    /* ---------- Custom cursor (desktop only) ---------- */
    html, body, a, button, [role="button"], input, textarea, select, .pill, .showreel {
      cursor: none !important;
    }

    .cursor-dot, .cursor-ring {
      position: fixed;
      top: 0; left: 0;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 9999;
    }
    .cursor-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #CE4127;
      mix-blend-mode: normal;
    }
    .cursor-ring {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 1px solid #CE4127;
      transition: width .15s ease, height .15s ease, opacity .15s ease, transform .15s ease;
      opacity: .9;
    }
    .cursor-ring.is-hover {
      transform: translate(-50%, -50%) scale(1.15);
      opacity: 1;
    }
    /* top-right coords HUD */
    .coords{
      position: fixed;
      top: 14px;
      right: 18px;
      z-index: 9998;
      pointer-events: none;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
      color: rgba(206,65,39,.75);
      text-align: right;
      letter-spacing: .02em;
    }
    .coords b{ color: #CE4127; font-weight: 600; }
    @media (hover: none) {
      .cursor-dot, .cursor-ring { display: none !important; }
      html, body { cursor: auto !important; }
    }
    @media (prefers-reduced-motion: reduce){
      .cursor-ring { transition: none; }
    }

    /* Sticky Stack Component Styles (like creativewebmanual.com) */
    .examples-section {
      width: 100%;
      /* padding: clamp(28px, 6vw, 72px) 0; */
      /* background: #0b0b0c; */
      color: #863b19;
      /* margin-top: 2rem; */
      border-radius: 0;
      /* min-height: calc(100vh * 3.2); */
    }

    .pin-spacer {
      order: 0;
      place-self: auto;
      grid-area: auto;
      z-index: auto;
      float: none;
      flex-shrink: 1;
      display: grid;
      margin: 0px;
      inset: 0px auto auto 0px;
      position: relative;
      flex-basis: auto;
      overflow: visible;
      box-sizing: border-box;
      width: 100%;
    }

    .examples__right-content {
      padding: 10vw;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      position: sticky;
      top: 0;
    }

    .examples__grid {
      display: flex;
      gap: clamp(24px, 4vw, 56px);
      align-items: start;
      translate: none;
      rotate: none;
      scale: none;
      inset: 0px auto auto 0px;
      margin: 0px;
      /* max-width: 334px; */
      /* width: 334px; */
      /* max-height: 2051.59px; */
      height: fit-content;
      padding: 0px;
      transform: translate(0px, 0px);
    }

    .examples__left {
      overflow: hidden;
      /* border-radius: 14px; */
      width: 50%;
      position: sticky;
      top: 0;
    }

    .examples__right {
      height: -webkit-fill-available;
      width: 50%;
      position: sticky;
      top: 0;
      align-self: start;
      text-align: left;
    }

    .examples__right h2 {
      text-align: left;
      margin: 0 0 18px;
      font-size: clamp(42px, 4.5vw, 86px);
      letter-spacing: -0.02em;
      line-height: .95;
      color: #ce4027;
      font-weight: 700;
    }

    .examples__right p {
      text-align: left;
      margin: 0;
      max-width: 46ch;
      font-size: clamp(16px, 1.35vw, 22px);
      line-height: 1.45;
      color: rgb(206 64 39);
    }

    .project-description-text {
      text-align: left;
      margin: 0 0 2rem 0;
      max-width: 46ch;
      font-size: clamp(16px, 1.35vw, 22px);
      line-height: 1.6;
      color: rgb(134 59 25);
    }

    .project-description-text p {
      margin: 0 0 1rem 0;
    }

    .project-description-text p:last-child {
      margin-bottom: 0;
    }

    .project-tag {
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: capitalize;
      color: rgb(206 64 39);
      font-weight: 600;
      margin-bottom: 0.5rem;
      opacity: 0.8;
      text-align: left;
    }

    .project-brand-title {
      font-size: clamp(32px, 4vw, 64px);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.02em;
      text-transform: uppercase;
      color: #ce4027;
      margin: 0 0 1.5rem 0;
      text-align: left;
    }

    .project-business-description {
      font-size: 16px;
      line-height: 1.7;
      color: rgb(206 64 39);
      margin: 0 0 2rem 0;
      max-width: 100%;
      text-align: left;
    }

    .project-view-button {
      width: fit-content;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 1rem 2rem;
      background: transparent;
      color: #ce4027;
      font-size: 16px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      text-decoration: none;
      border: 2px solid #ce4027;
      border-radius: 999px;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease;
    }

    .project-view-button:hover {
      transform: translateY(-2px);
      background: #ce4027;
      color: #F7E491;
    }

    .project-view-button:active {
      transform: translateY(0);
    }

    .project-actions {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.75rem 1.5rem;
      width: 100%;
    }

    .project-details-button {
      width: fit-content;
      display: inline-flex;
      align-items: center;
      padding: 0;
      background: none;
      border: 0;
      color: #ce4027;
      font-size: 15px;
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0.02em;
      text-decoration: underline;
      text-underline-offset: 0.2em;
      cursor: pointer;
      transition: opacity 0.2s ease, color 0.2s ease;
    }

    .project-details-button:hover {
      opacity: 0.75;
      color: #863b19;
    }

    .project-details-button:focus-visible {
      outline: 2px solid #ce4027;
      outline-offset: 4px;
    }

    body.details-modal-open {
      overflow: hidden !important;
    }

    body.details-modal-open .cursor-dot,
    body.details-modal-open .cursor-ring {
      z-index: 10001;
    }

    .details-modal,
    .details-modal * {
      cursor: none !important;
    }

    .details-modal {
      position: fixed;
      inset: 0;
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(20px, 4vw, 56px);
      box-sizing: border-box;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.28s ease, visibility 0.28s ease;
    }

    .details-modal.is-open {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .details-modal__backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.58);
      border: 0;
      padding: 0;
      cursor: pointer;
    }

    .details-modal__dialog {
      position: relative;
      z-index: 1;
      width: min(1180px, 92vw);
      max-height: min(88vh, 900px);
      background: var(--bg);
      color: var(--fg);
      border: 2px solid var(--fg);
      border-radius: clamp(14px, 2vw, 22px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.38);
    }

    .details-modal__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: clamp(1rem, 2.5vw, 1.5rem) clamp(1.25rem, 3vw, 2rem);
      border-bottom: 1px solid rgba(206, 65, 39, 0.25);
      flex-shrink: 0;
    }

    .details-modal__title {
      margin: 0;
      font-size: clamp(1.1rem, 2.2vw, 1.5rem);
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #ce4027;
    }

    .details-modal__close {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      border: 2px solid #ce4027;
      border-radius: 50%;
      background: transparent;
      color: #ce4027;
      font-size: 1.5rem;
      line-height: 1;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .details-modal__close:hover {
      background: #ce4027;
      color: var(--bg);
    }

    .details-modal__body {
      overflow-y: auto;
      padding: clamp(1rem, 2.5vw, 1.75rem);
      -webkit-overflow-scrolling: touch;
    }

    .details-modal__grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 240px), 1fr));
      gap: clamp(0.75rem, 2vw, 1.25rem);
    }

    .details-modal__grid .gallery-item {
      border-radius: clamp(8px, 1.5vw, 12px);
      aspect-ratio: 4 / 3;
      min-height: 160px;
    }

    .details-modal__empty {
      margin: 0;
      text-align: center;
      color: #863b19;
      font-size: 0.95rem;
      line-height: 1.6;
      padding: 2rem 1rem;
    }

    @media (max-width: 900px), ((max-width: 1100px) and (orientation: portrait)) {
      .details-modal {
        padding: 0;
        align-items: stretch;
      }

      .details-modal__dialog {
        width: 100%;
        max-width: 100%;
        max-height: 100%;
        height: 100%;
        border-radius: 0;
        border-width: 0;
        box-shadow: none;
      }

      .details-modal__header {
        padding-top: max(1rem, env(safe-area-inset-top));
      }

      .details-modal__body {
        flex: 1;
        min-height: 0;
      }

      .details-modal__grid {
        grid-template-columns: repeat(auto-fill, minmax(min(100%, 160px), 1fr));
      }
    }

    @media (max-width: 520px) {
      .project-actions {
        gap: 0.65rem 1rem;
      }

      .project-actions .project-details-button {
        text-align: left;
      }
    }

    .dropdown-container {
      margin-top: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .dropdown {
      border-top: 1px solid rgba(134, 59, 25, 0.2);
      border-bottom: 1px solid rgba(134, 59, 25, 0.2);
    }

    .dropdown-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.25rem 1.25rem;
      cursor: pointer;
      user-select: none;
      transition: opacity 0.2s ease;
    }

    .dropdown-header:hover {
      opacity: 0.7;
    }

    .dropdown-title {
      font-size: clamp(18px, 1.5vw, 24px);
      font-weight: 600;
      color: #ce4027;
      margin: 0;
    }

    .dropdown-icon {
      width: 20px;
      height: 20px;
      position: relative;
      flex-shrink: 0;
    }

    .dropdown-icon::before,
    .dropdown-icon::after {
      content: '';
      position: absolute;
      background: #ce4027;
      transition: opacity 0.3s ease, transform 0.3s ease;
      left: 50%;
      top: 50%;
    }

    .dropdown-icon::before {
      width: 2px;
      height: 12px;
      transform: translate(-50%, -50%);
    }

    .dropdown-icon::after {
      width: 12px;
      height: 2px;
      transform: translate(-50%, -50%);
    }

    .dropdown.active .dropdown-icon::before {
      opacity: 0;
      transform: translate(-50%, -50%) rotate(90deg);
    }

    .dropdown-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease, padding 0.4s ease;
      padding: 0;
    }

    .dropdown.active .dropdown-content {
      max-height: 1000px;
      padding: 1.5rem;
    }

    .dropdown-content p {
      font-size: clamp(14px, 1.2vw, 18px);
      line-height: 1.7;
      color: rgb(206 64 39);
      margin: 0;
      opacity: 0.9;
    }

    .examples__collection {
      display: flex;
      flex-direction: column;
      gap: 0;
      border-top: 1px solid rgba(242, 242, 242, 0.18);  
    }

    .examples__item {
      position: relative;
      width: 100%;
      border-bottom: 1px solid rgba(242, 242, 242, 0.18);
    }

    .eyebrow-wrap {
      background-color: #ce4027;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 1.5rem 1rem;
      user-select: none;
      pointer-events: none;
    }

    .examples__item-content {
      max-height: none;
      overflow: visible;
      opacity: 1;
    }

    .eyebrow-marker {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #f2f2f2;

      left: 0;

      text-align: left;

    .content-text {
      padding: 0;

    }

    .content-text h3 {

      font-weight: 600;
      line-height: 1.3;
      color: #863b19;
      margin: 0 0 1rem 0;
      text-transform: none;
      letter-spacing: -0.01em;
      text-align: left;

    .content-text p {
      margin: 0 0 1rem 0;

      line-height: 1.7;

    .examples__media-grid {

      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;

    .examples__media-grid .examples__media {
      margin-bottom: 0;
    }

    .gallery {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
      visibility: visible;
      opacity: 1;
    }

    .gallery-item {
      position: relative;
      width: 100%;
      border-radius: 0;
      overflow: hidden;
      background: #000;
      aspect-ratio: 16 / 9;
      min-height: 200px;
    }

    .gallery-item img,
    .gallery-item video,
    .gallery-item iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border: none;
      visibility: visible;
      opacity: 1;
    }

    /* Ensure images are visible and load properly */
    .gallery-item img {
      z-index: 1;
    }

    /* Ensure GIFs loop naturally and display properly */
    .gallery-item img.gif-image,
    .gallery-item img[src$=".gif"],
    .gallery-item img[src*=".gif"],
    .gallery-item img[src*="%20V1.gif"],
    .gallery-item img[src*="%20V2.gif"] {
      image-rendering: auto;
      object-fit: contain;
      background: #000;
      display: block;
      visibility: visible;
      opacity: 1;
      /* Ensure GIFs animate properly */
      will-change: auto;
      transform: none;
      animation: none;
      /* Prevent any CSS that might stop GIF animation */
      pointer-events: auto;

    .gallery-item video {
      z-index: 1;
    }

    .gallery-item iframe {
      z-index: 1;
      min-height: 400px;

    /* Page load animations */
    /* Page load animations - Slide in from different directions */
    @keyframes slideDown {
      from {
        transform: translateY(-100px);
      }
      to {
        transform: translateY(0);
      }
    }

    @keyframes slideUp {
      from {
        transform: translateY(100px);
      }
      to {
        transform: translateY(0);
      }
    }

    @keyframes slideRight {
      from {
        transform: translateX(-100px);
      }
      to {
        transform: translateX(0);
      }
    }

    @keyframes slideLeft {
      from {
        transform: translateX(100px);
      }
      to {
        transform: translateX(0);
      }
    }

    /* Initially position elements off-screen */
    .showreel {
      transform: translateY(-100px);
    }

    .center {
      transform: translateX(-100px);
    }

    .bottom-left {
      transform: translateX(-100px) translateY(100px);
    }

    .examples__left {
      transform: translateX(-150px);
    }

    .examples__right {
      transform: translateX(150px);
    }

    /* Animate in on load */
    .showreel.animate-in {
      animation: slideDown 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.1s forwards;
    }

    .center.animate-in {
      animation: slideRight 1s cubic-bezier(0.4, 0, 0.2, 1) 0.2s forwards;
    }

    .bottom-left.animate-in {
      animation: slideRight 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.4s forwards;
    }

    .examples__left.animate-in {
      animation: slideRight 1s cubic-bezier(0.4, 0, 0.2, 1) 0.3s forwards;
    }

    .examples__right.animate-in {
      animation: slideLeft 1s cubic-bezier(0.4, 0, 0.2, 1) 0.5s forwards;
    }

    .div-description-container {
      width: 100%;
      display: flex;
      justify-content: flex-start;
      align-items: center;
      flex-direction: row;
    }

    /* Page Transition Overlay */
    .page-transition {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg); /* Default to current page background */
      z-index: 99999;
      pointer-events: none;
      transform: translateY(100%);
      transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1),
                  background 0.1s ease;
    }
    
    /* Red background when transitioning to work.html */
    .page-transition.to-red {
      background: #ce4127;
    }
    
    /* Yellow background when transitioning to yellow pages */
    .page-transition.to-yellow {
      background: #F7E491;
    }

    .page-transition.to-dark {
      background: #060605;
    }

    .page-transition.is-active {
      transform: translateY(0);
      pointer-events: all;
    }

    .page-transition.is-exiting {
      transform: translateY(-100%);
    }

    /* Elements change color as overlay covers them */
    body.transitioning .showreel,
    body.transitioning .center,
    body.transitioning .bottom-left,
    body.transitioning .coords,
    body.transitioning .examples__right,
    body.transitioning .examples__left {
      transition: color 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                  fill 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                  stroke 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                  border-color 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body.transitioning .showreel *,
    body.transitioning .center *,
    body.transitioning .bottom-left *,
    body.transitioning .coords *,
    body.transitioning .examples__right *,
    body.transitioning .examples__left * {
      transition: color 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                  fill 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                  stroke 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                  border-color 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Prevent flash of unstyled content */
    body.page-loading {
      overflow: hidden;
    }
  </style>

    // Get project ID from URL (set by work.html when user clicks a project title)
    // Example: work.html links to "project.html?project=01" for GATORADE
    // This matches the data-video attribute from work.html's project-item
    const urlParams = new URLSearchParams(window.location.search);
    const projectId = urlParams.get('project') || '01';
    const project = projects[projectId] || projects['01'];
    
    // The project.video now contains the same video path as the data-video from work.html
    // This video will be used in all accordion items

    const DETAIL_SECTIONS = ['howItStarted', 'process', 'assets', 'finalResult'];

    function collectProjectMedia(project) {
      const seen = new Set();
      const items = [];

      const add = (item) => {
        if (!item || !item.src) return;
        const key = item.src;
        if (seen.has(key)) return;
        seen.add(key);
        items.push(item);
      };

      if (project.video) {
        const src = project.video;
        const isVideo = /\.(mp4|mov|webm)(\?|$)/i.test(src);
        add({
          type: isVideo ? 'video' : 'image',
          src,
          alt: `${project.name} showreel`
        });
      }

      DETAIL_SECTIONS.forEach((sectionKey) => {
        const data = project[sectionKey];
        if (!data) return;
        if (data.media && data.media.length) {
          data.media.forEach(add);
        }
        if (data.images && data.images.length) {
          data.images.forEach((src, index) => {
            add({
              type: 'image',
              src,
              alt: `${data.title || sectionKey} ${index + 1}`
            });
          });
        }
      });

      return items;
    }

    function renderDetailsGridItem(item, fallbackAlt) {
      const alt = (item.alt || fallbackAlt || 'Project detail').replace(/"/g, '&quot;');
      const src = encodeURI(item.src);

      if (item.type === 'youtube' || (item.src && item.src.includes('youtube.com/embed'))) {
        return `
          <div class="gallery-item">
            <iframe src="${src}" title="${alt}" frameborder="0" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen loading="lazy"></iframe>
          </div>
        `;
      }

      if (item.type === 'video' || /\.(mp4|mov|webm)(\?|$)/i.test(item.src)) {
        return `
          <div class="gallery-item">
            <video autoplay loop muted playsinline preload="metadata">
              <source src="${src}" type="video/mp4">
              <source src="${src}" type="video/quicktime">
              <source src="${src}" type="video/webm">
            </video>
          </div>
        `;
      }

      const isGif = item.src && (item.src.toLowerCase().endsWith('.gif') || item.src.toLowerCase().includes('.gif'));
      return `
        <div class="gallery-item">
          <img src="${src}" alt="${alt}" loading="lazy"${isGif ? ' class="gif-image"' : ''} />
        </div>
      `;
    }

    function generateDetailsGrid(mediaArray, fallbackAlt) {
      if (!mediaArray || !mediaArray.length) {
        return '<p class="details-modal__empty">Detail media coming soon for this project.</p>';
      }
      return `
        <div class="details-modal__grid">
          ${mediaArray.map((item) => renderDetailsGridItem(item, fallbackAlt)).join('')}
        </div>
      `;
    }

    function initDetailsModal() {
      const modal = document.getElementById('detailsModal');
      if (!modal || modal.dataset.bound === '1') return;
      modal.dataset.bound = '1';

      const closeModal = () => {
        modal.classList.remove('is-open');
        modal.setAttribute('aria-hidden', 'true');
        modal.hidden = true;
        document.body.classList.remove('details-modal-open');
      };

      modal.querySelectorAll('[data-details-close]').forEach((el) => {
        el.addEventListener('click', closeModal);
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modal.classList.contains('is-open')) {
          closeModal();
        }
      });

      window.closeDetailsModal = closeModal;
      window.openDetailsModal = (project) => {
        const body = document.getElementById('detailsModalBody');
        if (!body) return;
        const media = collectProjectMedia(project);
        body.innerHTML = generateDetailsGrid(media, project.name);
        body.querySelectorAll('video').forEach((video) => {
          video.load();
          video.play().catch(() => {});
        });
        modal.hidden = false;
        modal.classList.add('is-open');
        modal.setAttribute('aria-hidden', 'false');
        document.body.classList.add('details-modal-open');
        modal.querySelector('.details-modal__close')?.focus();
      };
    }

    initDetailsModal();

    // Helper function to generate single large image HTML from media array (only first item)
    const generateGallery = (mediaArray, altText) => {
      // Use placeholder if no media array or empty
      const placeholderImage = 'https://via.placeholder.com/1200x800/863B19/F7E491?text=Project+Image';
      
      // Get first item or use placeholder
      let item = null;
      if (mediaArray && mediaArray.length > 0) {
        item = mediaArray[0];
      } else {
        item = { type: 'image', src: placeholderImage, alt: altText || 'Project image' };
      }
      
      return `
        <div class="gallery">
          ${(() => {
            // Handle YouTube videos
            if (item.type === 'youtube' || (item.src && item.src.includes('youtube.com/embed'))) {
              return `
                <div class="gallery-item">
                  <iframe src="${encodeURI(item.src)}" frameborder="0" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>
                </div>
              `;
            } 
            // Handle local video files (will loop automatically)
            else if (item.type === 'video' || (item.src && (item.src.endsWith('.mp4') || item.src.endsWith('.mov') || item.src.endsWith('.webm')))) {
              return `
                <div class="gallery-item">
                  <video autoplay loop muted playsinline preload="auto">
                    <source src="${encodeURI(item.src)}" type="video/mp4">
                    <source src="${encodeURI(item.src)}" type="video/quicktime">
                    <source src="${encodeURI(item.src)}" type="video/webm">
                  </video>
                </div>
              `;
            } 
            // Handle images and GIFs (GIFs loop automatically by nature)
            else {
              const isGif = item.src && (item.src.toLowerCase().endsWith('.gif') || item.src.toLowerCase().includes('.gif'));
              return `
                <div class="gallery-item">
                  <img src="${encodeURI(item.src)}" alt="${item.alt || altText || 'Project image'}" loading="lazy" ${isGif ? 'class="gif-image"' : ''} />
                </div>
              `;
            }
          })()}
        </div>
      `;
    };

    function resolveLiveEmbedUrl(project) {
      if (project.liveEmbedUrl) return project.liveEmbedUrl;
      if (project.liveEmbedPath) {
        return new URL(project.liveEmbedPath, document.baseURI || window.location.href).href;
      }
      return project.liveSiteUrl;
    }

    function generateLiveSiteEmbed(project) {
      const safeTitle = (project.name + ' — live site preview').replace(/"/g, '&quot;');
      const srcdocAttr = project.liveEmbedScript ? ' data-live-srcdoc="1"' : '';
      const srcAttr = project.liveEmbedScript
        ? ''
        : ` src="${resolveLiveEmbedUrl(project)}"`;
      return `
        <div class="live-site-frame-scaler">
          <iframe
            class="live-site-frame"
            ${srcdocAttr}${srcAttr}
            title="${safeTitle}"
            width="1280"
            height="720"
            loading="lazy"
            allow="fullscreen"
            referrerpolicy="no-referrer-when-downgrade"
          ></iframe>
        </div>
      `;
    }

    function fitLivePreview(root) {
      const wrap = root.querySelector('.examples__live-site');
      const scaler = root.querySelector('.live-site-frame-scaler');
      if (!wrap || !scaler) return;
      const w = wrap.clientWidth;
      if (w < 1) return;
      const scale = w / 1280;
      scaler.dataset.fitScale = '1';
      scaler.style.transform = 'scale(' + scale + ')';
      wrap.style.height = (w * 720 / 1280) + 'px';
    }

    function mountSrcdocEmbed(project, root) {
      const iframe = root.querySelector('.live-site-frame[data-live-srcdoc]');
      if (!iframe || !project.liveEmbedScript) return;

      const applyHtml = (html) => {
        if (!html) return;
        const desktopHtml = html.replace(
          /content="width=device-width,\s*initial-scale=1"/i,
          'content="width=1280, initial-scale=1"'
        );
        iframe.srcdoc = desktopHtml;
        requestAnimationFrame(() => {
          requestAnimationFrame(() => fitLivePreview(root));
        });
      };

      const useIframeFile = () => {
        if (!project.liveEmbedPath) return false;
        iframe.removeAttribute('data-live-srcdoc');
        iframe.src = new URL(project.liveEmbedPath, document.baseURI || window.location.href).href;
        return true;
      };

      if (window.OZINT_EMBED_HTML) {
        applyHtml(window.OZINT_EMBED_HTML);
        return;
      }

      const script = document.createElement('script');
      script.src = new URL(project.liveEmbedScript, document.baseURI || window.location.href).href;
      script.onload = () => applyHtml(window.OZINT_EMBED_HTML);
      script.onerror = () => {
        if (!useIframeFile()) {
          iframe.srcdoc = '<!DOCTYPE html><html><body style="margin:0;background:#0a0a0a;color:#f2f2f2;font:14px/1.5 system-ui,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;padding:1.5rem;text-align:center"><p>Preview unavailable. <a href="' + project.liveSiteUrl + '" target="_blank" rel="noopener" style="color:#f7e491">Open live site</a></p></body></html>';
        }
      };
      document.head.appendChild(script);
    }

    function generateSectionGallery(project, section) {
      if (project.liveSiteUrl) return '';
      const data = project[section];
      if (!data) return '';
      if (data.media && data.media.length > 0) {
        return generateGallery(data.media, data.title);
      }
      if (data.images && data.images.length > 0) {
        return generateGallery(
          data.images.map((img) => ({ type: 'image', src: img, alt: data.title })),
          data.title
        );
      }
      return '';
    }

    // Load project content
    const contentEl = document.getElementById('projectContent');
    if (contentEl && project) {
      document.body.classList.toggle('project-page--live', !!project.liveSiteUrl);

      contentEl.innerHTML = `
        <!-- Sticky Stack Component -->
        <section class="examples-section" id="examples">
          <div class="examples__grid">
            <!-- LEFT COLUMN (sticky items) -->
            <div class="examples__left${project.liveSiteUrl ? ' examples__left--embed' : ''}">
              ${project.liveSiteUrl ? `
              <div class="examples__live-site">
                ${generateLiveSiteEmbed(project)}
              </div>
              ` : `
              <div class="examples__collection">
                <div class="examples__item" data-item-index="0">
                  <div class="examples__item-content">${generateSectionGallery(project, 'howItStarted')}</div>
                </div>
                <div class="examples__item" data-item-index="1">
                  <div class="examples__item-content">${generateSectionGallery(project, 'process')}</div>
                </div>
                <div class="examples__item" data-item-index="2">
                  <div class="examples__item-content">${generateSectionGallery(project, 'assets')}</div>
                </div>
                <div class="examples__item" data-item-index="3">
                  <div class="examples__item-content">${generateSectionGallery(project, 'finalResult')}</div>
                </div>
              </div>
              `}
            </div>

            <!-- RIGHT COLUMN -->
            <div class="examples__right">
              <div class="examples__right-content">
              <div class="project-tag">Campaign Site</div>
              <h2 class="project-brand-title">${project.name}</h2>
              <div class="project-business-description">
                ${project.businessDescription || 'A comprehensive digital platform designed to elevate brand presence and drive meaningful engagement. Through innovative design and strategic development, we created a solution that connects with audiences and delivers measurable results.'}
              </div>
              <div class="project-actions">
                <a href="${project.liveSiteUrl || '#'}" class="project-view-button"${project.liveSiteUrl ? ' target="_blank" rel="noopener noreferrer"' : ''}>View the Result</a>
                <button type="button" class="project-details-button" data-details-modal-open>God Is in the Small Details</button>
              </div>
            </div>
            </div>
          </div>
        </section>
      `;

      // Update page title
      document.title = `${project.name} - IS Experience House`;

      const detailsBtn = contentEl.querySelector('[data-details-modal-open]');
      if (detailsBtn) {
        detailsBtn.addEventListener('click', (e) => {
          e.preventDefault();
          if (typeof window.openDetailsModal === 'function') {
            window.openDetailsModal(project);
          }
        });
      }

      if (project.liveEmbedScript) {
        mountSrcdocEmbed(project, contentEl);
      }
      if (project.liveSiteUrl) {
        const scheduleFit = () => {
          requestAnimationFrame(() => {
            requestAnimationFrame(() => fitLivePreview(contentEl));
          });
        };
        scheduleFit();
        window.addEventListener('resize', scheduleFit);
        if (typeof ResizeObserver !== 'undefined') {
          const wrap = contentEl.querySelector('.examples__live-site');
          if (wrap) new ResizeObserver(scheduleFit).observe(wrap);
        }
      }

      // Animate examples sections after content loads
      setTimeout(() => {
        const examplesLeft = document.querySelector('.examples__left');
        const examplesRight = document.querySelector('.examples__right');
        if (examplesLeft) examplesLeft.classList.add('animate-in');
        if (examplesRight) examplesRight.classList.add('animate-in');
      }, 100);
      
      // Initialize scroll-based accordion functionality with scroll pinning
      setTimeout(() => {
        const examplesSection = contentEl.querySelector('.examples-section');
        const examplesGrid = contentEl.querySelector('.examples__grid');
        const accordionItems = Array.from(contentEl.querySelectorAll('.examples__item'));
        const totalItems = accordionItems.length;
        
        if (!examplesSection || !examplesGrid || totalItems === 0) return;
        
        // Ensure all videos are loaded and ready
        const videos = contentEl.querySelectorAll('.examples__item video');
        videos.forEach(video => {
          video.load();
          video.play().catch(() => {});
        });
      }, 300);

    }
    
    // Trigger animations after content is loaded
    requestAnimationFrame(() => {
      setTimeout(() => {
        const showreel = document.querySelector('.showreel');
        const center = document.querySelector('.center');
        const bottomLeft = document.querySelector('.bottom-left');
        
        if (showreel) showreel.classList.add('animate-in');
        if (center) center.classList.add('animate-in');
        if (bottomLeft) bottomLeft.classList.add('animate-in');
        
        // Animate examples sections
        const examplesLeft = document.querySelector('.examples__left');
        const examplesRight = document.querySelector('.examples__right');
        if (examplesLeft) examplesLeft.classList.add('animate-in');
        if (examplesRight) examplesRight.classList.add('animate-in');
      }, 100);
    });

    // Back button navigation handled by href

    /* -------- Custom cursor logic -------- */
    (function(){
      const dot  = document.getElementById('cursorDot');
      const ring = document.getElementById('cursorRing');

      if (!dot || !ring) return;

      let x = window.innerWidth / 2, y = window.innerHeight / 2;
      let rx = x, ry = y;
      const ease = 0.18;

      function move(e){
        x = e.clientX;
        y = e.clientY;
        dot.style.transform  = `translate(${x}px, ${y}px)`;
      }

      function tick(){
        rx += (x - rx) * ease;
        ry += (y - ry) * ease;
        ring.style.transform = `translate(${rx - 0}px, ${ry - 0}px) translate(-50%, -50%)`;
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);

      window.addEventListener('mousemove', move, {passive:true});
      // coords HUD
      (function(){
        const mx = document.getElementById('mx');
        const my = document.getElementById('my');
        if (!mx || !my) return;
        window.addEventListener('mousemove', (e) => {
          mx.textContent = Math.round(e.clientX);
          my.textContent = Math.round(e.clientY);
        }, { passive: true });
      })();

      function updateHover(e){
        const target = e.target.closest('a, button, [role="button"], .pill, .showreel, input, select, textarea, label');
        ring.classList.toggle('is-hover', !!target);
      }
      window.addEventListener('mousemove', updateHover, {passive:true});

      window.addEventListener('mousedown', ()=> ring.style.opacity = '0.7');
      window.addEventListener('mouseup',   ()=> ring.style.opacity = '0.9');

      window.addEventListener('mouseleave', ()=> {
        dot.style.opacity = '0'; ring.style.opacity = '0';
      });
      window.addEventListener('mouseenter', ()=> {
        dot.style.opacity = '1'; ring.style.opacity = '0.9';
      });
    })();

    /* Set --vh to innerHeight for older Safari/Chrome on iOS */
    (function(){
      function setVh(){
        const vh = window.innerHeight * 0.01;
        document.documentElement.style.setProperty('--vh', `${vh}px`);
      }
      setVh();
      window.addEventListener('resize', setVh);
      window.addEventListener('orientationchange', setVh);
    })();

    /* Smooth scroll enhancement for anchor links */
    (function() {
      document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener('click', function (e) {
          const href = this.getAttribute('href');
          if (href === '#' || href === '#contact' || href === '#work') {
            e.preventDefault();
            const target = document.querySelector(href);
            if (target) {
              target.scrollIntoView({
                behavior: 'smooth',
                block: 'start'
              });
            }
          }
        });
      });
    })();

    /* Cutting-Edge Page Transitions */
    (function() {
      const transition = document.getElementById('pageTransition');
      if (!transition) return;

      // Check if page is loading
      if (document.readyState === 'loading') {
        document.body.classList.add('page-loading');
        window.addEventListener('load', () => {
          setTimeout(() => {
            document.body.classList.remove('page-loading');
            transition.classList.remove('is-active');
          }, 100);
        });
      } else {
        // Page already loaded, fade in transition
        setTimeout(() => {
          transition.classList.remove('is-active');
        }, 100);
      }

      // Page color mapping
      const pageColors = {
        'work.html': { bg: '#ce4127', text: '#F7E491' }, // Red page
        'index.html': { bg: '#F7E491', text: '#CE4127' }, // Yellow page
        'project.html': { bg: '#F7E491', text: '#CE4127' }, // Yellow page
        'About.html': { bg: '#ce4127', text: '#ffffff' },
        'contact.html': { bg: '#F7E491', text: '#CE4127' },
        'long-term.html': { bg: '#F7E491', text: '#CE4127' }
      };

      // Intercept all internal navigation links
      document.querySelectorAll('a[href$=".html"], a[href*=".html?"]').forEach(link => {
        link.addEventListener('click', function(e) {
          const href = this.getAttribute('href');
          // Skip if it's an external link or has target="_blank"
          if (href.startsWith('http') || this.target === '_blank' || href.startsWith('mailto:')) {
            return;
          }

          e.preventDefault();
          
          // Extract target page name
          const targetPage = href.split('/').pop().split('?')[0];
          const targetColor = pageColors[targetPage] || pageColors['index.html'];
          const currentBg = getComputedStyle(document.documentElement).getPropertyValue('--bg').trim();
          const isCurrentRed = currentBg === '#ce4127' || currentBg === 'rgb(206, 65, 39)';
          const isTargetRed = targetColor.bg === '#ce4127';
          const isTargetDark = targetColor.bg === '#060605';
          
          transition.classList.remove('to-red', 'to-yellow', 'to-dark');
          if (isTargetRed) {
            transition.classList.add('to-red');
          } else if (isTargetDark) {
            transition.classList.add('to-dark');
          } else {
            transition.classList.add('to-yellow');
          }
          
          // Add transitioning class
          document.body.classList.add('transitioning');
          
          // Function to update element colors based on overlay position
          function updateColors() {
            const overlayRect = transition.getBoundingClientRect();
            const overlayTop = overlayRect.top;
            
            // Elements to update
            const elements = document.querySelectorAll('.showreel, .center, .bottom-left, .coords, .examples__right, .examples__left, .showreel *, .center *, .bottom-left *, .coords *, .examples__right *, .examples__left *, svg path, .pill, .pill *');
            
            elements.forEach(el => {
              const elRect = el.getBoundingClientRect();
              const elBottom = elRect.bottom;
              
              // If element is covered by overlay
              if (elBottom <= overlayTop + 5) {
                const computedStyle = window.getComputedStyle(el);
                
                // Change text color to target page's text color
                if (computedStyle.color && computedStyle.color !== 'rgba(0, 0, 0, 0)' && computedStyle.color !== 'transparent') {
                  el.style.color = targetColor.text;
                }
                
                // Change SVG fill
                if (el.tagName === 'path') {
                  el.style.fill = targetColor.text;
                }
                
                // Change border color
                if (computedStyle.borderColor && computedStyle.borderColor !== 'rgba(0, 0, 0, 0)' && computedStyle.borderColor !== 'transparent') {
                  el.style.borderColor = targetColor.text;
                }
                
                // Change outline color
                if (el.classList.contains('showreel') || el.closest('.showreel')) {
                  el.style.outlineColor = targetColor.text;
                }
              }
            });
          }
          
          // Update colors as overlay animates
          let animationFrameId;
          function animateColors() {
            if (transition.classList.contains('is-active')) {
              updateColors();
              animationFrameId = requestAnimationFrame(animateColors);
            } else {
              cancelAnimationFrame(animationFrameId);
            }
          }
          animateColors();
          
          // Show transition overlay (slide up from bottom)
          transition.classList.add('is-active');
          
          // Navigate after transition completes
          setTimeout(() => {
            window.location.href = href;
          }, 1000);
        });
      });

      // Handle browser back/forward buttons
      window.addEventListener('pageshow', (e) => {
        if (e.persisted) {
          // Page was loaded from cache
          transition.classList.remove('is-active');
        }
      });

      window.addEventListener('popstate', () => {
        transition.classList.add('is-active');
        setTimeout(() => {
          transition.classList.remove('is-active');
        }, 600);
      });
    })();
  </script>
</body>
</html>
