<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IS - Experience House</title>

  <!-- Favicon with dollar sign with wings emoji -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💸</text></svg>" />

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/scrollbars.css">

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollToPlugin.min.js"></script>

  <style>
    :root{
      --bg: #ce4127;
      --fg: #F7E491;
      --muted: #F7E491;
      --border: rgba(247, 228, 145, 1);
      --dot: #F7E491;
      --dot-glow: rgba(247, 228, 145, 0.6);
      --accent-img: url('https://images.unsplash.com/photo-1501785888041-af3ef285b470?q=80&w=1600&auto=format&fit=crop');
      --gutter: clamp(16px, 6vw, 140px);
      --toast-bg: rgba(255,255,255,.08);

      /* Embed sizing caps */
      --embed-w-cap: 2400px;
      --embed-h-cap: 78vh;
      --embed-pad: 24px;

      /* vh fallback var for older iOS */
      --vh: 1vh;
    }

    html {
      scroll-behavior: smooth;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans", "Liberation Sans", sans-serif;
      overflow: clip;
    }

    .screen {
      position: relative;
      width: 100vw;

      /* viewport height fixes */
      height: 100vh;
      height: 100svh;
      height: 100dvh;
      height: calc(var(--vh) * 100);

      overflow: hidden;
      background: var(--bg);
      isolation: isolate;
    }

    /* LEFT-ALIGNED content area */
    .center{
      width: 100vw;
      position: absolute;
      inset: 0;
      display: grid;
      align-items: center;
      justify-items: start;
      text-align: left;
      pointer-events: none;
    }
    .stack{
      display: grid;
      gap: clamp(.5rem, 1.5vh, 1rem);
      align-items: start;
      justify-items: start;
      text-align: left;
    }

    .eyebrow {
      position: relative; z-index: 2;
      padding-left: var(--gutter);
      letter-spacing: .18em;
      font-size: clamp(.7rem, 1.2vw, 1rem);
      text-transform: uppercase;
      color: var(--muted);
      pointer-events: auto;
    }

    /* Projects horizontal scroll */
    .projects-container {
      pointer-events: auto;
      position: relative;
      z-index: 1;
      width: 100%;
      overflow-x: auto;
      overflow-y: visible; /* allow hover preview to render above */
      scroll-behavior: auto;
      -webkit-overflow-scrolling: touch;
      /* padding-left: calc(50% - var(--gutter)); */
      /* padding-right: calc(50% - var(--gutter)); */
      touch-action: pan-x;
      overscroll-behavior-x: contain;
      margin: 0 auto;
      cursor: grab;
      will-change: scroll-position;
    }
    
    .projects-container:active {
      cursor: grabbing;
    }

    .projects-list {
      list-style: none;
      display: flex;
      gap: 5rem;
      padding-right: var(--gutter);
      min-width: max-content;
      margin: 0;
    }

    .project-item {
      flex-shrink: 0;
      /* min-width: 400px; */
      will-change: transform, opacity;
      transform-origin: center center;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      perspective: 1000px;
    }

    .project-link {
      display: block;
      position: relative;
      text-decoration: none !important;
      color: var(--fg);
      transition: opacity 0.2s ease;
      pointer-events: auto;
      border: none;
      outline: none;
    }

    /* Floating animation for video preview */
    @keyframes float {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-8px);
      }
    }

    /* Hover video preview (desktop only) */
    @media (min-width: 1024px) {
      /* Portal preview lives in <body>, so it never gets clipped by the slider */
      .project-preview {
        position: fixed;
        left: 0;
        top: 0;
        width: 560px;
        height: auto; /* set dynamically per-video */
        border-radius: 14px;
        overflow: hidden;
        background: #000;
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition: opacity .18s ease, visibility .18s ease;
        box-shadow: 0 18px 48px rgba(0,0,0,.55);
        z-index: 50;
      }
      .project-preview.is-visible {
        opacity: 1;
        visibility: visible;
        animation: float 3s ease-in-out infinite;
      }
      .project-preview video {
        display: block;
        width: 100%;
        height: auto;
        object-fit: cover;
      }
    }

    .project-link:visited,
    .project-link:active,
    .project-link:focus {
      text-decoration: none !important;
      border: none;
      outline: none;
    }

    .project-link:hover {
      opacity: 0.7;
      text-decoration: none !important;
    }

    .project-number {
      font-size: 1.2rem;
      font-weight: 500;
      margin-bottom: 0.8rem;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    .project-name {
      font-size: clamp(4rem, 10vw, 12rem);
      font-weight: 700;
      line-height: 0.9;
      letter-spacing: -0.02em;
      text-transform: uppercase;
      white-space: nowrap;
      color: var(--fg);
    }

    /* top-left showreel */
    .showreel {
      position: absolute; left: clamp(16px, 2vw, 32px); top: clamp(14px, 2.2vh, 28px);
      display: inline-flex; align-items: center; gap: .9rem;
      color: var(--fg);
      cursor: none !important;
      pointer-events: auto;
      user-select: none;
      text-decoration: none;
      z-index: 3;
    }
    
    /* Hover animation for play icon - move right then come back from left */
    @keyframes playIconHover {
      0% {
        transform: translateX(0);
      }
      50% {
        transform: translateX(20px);
      }
      51% {
        transform: translateX(-20px);
      }
      100% {
        transform: translateX(0);
      }
    }
    
    .showreel .icon {
      width: 46px; height: 46px; border-radius: 10px;
      position: relative; display: grid; place-items: center;
      outline: 1.5px solid var(--border);
      transition: transform .15s ease;
    }
    .showreel .icon::before {
      content: ""; position: absolute; inset: 0;
      border: 1.5px dashed rgba(247, 228, 145,.25);
      border-radius: 10px;
      transform: scale(.86);
    }
    .showreel .play {
      width: 0; height: 0;
      border-left: 10px solid var(--fg);
      border-top: 7px solid transparent;
      border-bottom: 7px solid transparent;
      margin-left: 2px;
      transition: none;
    }
    
    .showreel:hover .play {
      animation: playIconHover 0.6s ease-out;
    }
    
    .showreel span.label{
      font-weight: 600;
      letter-spacing: .06em;
      font-size: clamp(.75rem, 1.1vw, 1rem);
      text-transform: uppercase;
      opacity: .95;
    }
    .showreel:hover .icon{ transform: scale(1.04); }

    /* bottom-left: logo + pills */
    .bottom-left {
      margin-bottom: 24px;
      position: absolute; left: clamp(12px, 2.4vw, 48px); bottom: clamp(14px, 2.2vh, 28px);
      display: flex; align-items: flex-end; gap: 24px;
      z-index: 2;
      pointer-events: auto;
      cursor: none !important;
    }
    .logo-svg { width: 36px; height: auto; display: block; }

    .pills { display: flex; gap: clamp(10px, 1.2vw, 16px); flex-wrap: wrap; }
    .pill {
      pointer-events: auto;
      display: inline-flex; align-items: center; gap: .6rem;
      padding: .65rem 1.1rem;
      border: 1.6px solid var(--fg);
      border-radius: 999px;
      background: #f7e491;
      color: #CE4127;
      border-color: #CE4127;
      font-weight: 600;
      letter-spacing: .05em;
      font-size: clamp(.72rem, .95vw, .9rem);
      text-transform: uppercase;
      text-decoration: none;
      transition: background .2s ease, color .2s ease, transform .12s ease, border-color .2s ease;
      cursor: none !important;
    }
    .pill .dot{ width: .45rem; height: .45rem; border-radius: 50%; background: #CE4127; }
    .pill:hover { background: var(--bg); color: var(--fg); transform: translateY(-1px); }
    .pill:hover .dot{ background: var(--fg); }

    /* bottom-right rock wedge */
    .wedge {
      position: absolute; right: -6vw; bottom: -10vh;
      width: min(64vw, 1100px);
      height: min(42vh, 480px);
      background-image: var(--accent-img);
      background-size: cover; background-position: center;
      filter: grayscale(1) contrast(1.2) brightness(.9);
      opacity: .9;
      clip-path: polygon(22% 0, 100% 0, 100% 100%, 0 100%, 8% 62%);
      transform: rotate(-2deg);
      pointer-events: none;
      z-index: 0;
    }

    :focus-visible { outline: 2px dashed #fff; outline-offset: 3px; }

    /* under 520px tweaks */
    @media (max-width: 520px){
      :root{ --gutter: clamp(12px, 5vw, 24px); }
      .showreel span.label{ display:none; }
      
      /* Center content on small screens */
      .center {
        justify-items: center;
      }
      
      .stack {
        justify-items: center;
        width: 100%;
      }
      
      .projects-container {
        /* padding-left: calc(50% - var(--gutter)); */
        /* padding-right: calc(50% - var(--gutter)); */
        width: 100%;
      }
      
      .projects-list {
        gap: 8rem;
        padding-right: var(--gutter);
      }
      
      .project-item {
        min-width: 280px;
      }
      
      .project-name {
        font-size: clamp(2rem, 10vw, 6rem);
      }
    }

    /* under 470px → stack pills vertically ABOVE the logo */
    @media (max-width: 470px){
    	.logo-svg { width: 48px; }
      .bottom-left{
        margin-bottom: 0;
        flex-direction: column-reverse;
        align-items: flex-start;
        gap: 44px;
      }
      .pills{
        display: flex;
        flex-direction: column;
        flex-wrap: nowrap;
        gap: 8px;
      }
      .pill{
        padding: .5rem .8rem;
        font-size: .8rem;
        letter-spacing: .03em;
      }
      .center {
        align-items: center;
        justify-items: center;
        /* margin-top: 100px; */
      }
      
      .stack {
        justify-items: center;
        width: 100%;
      }
      
      .projects-list {
        gap: 6rem;
      }
      
      .project-item {
        min-width: 250px;
      }
    }

    /* Hide the toast completely */
    .toast { display: none !important; }

    /* ---------- Custom cursor (desktop only) ---------- */
    html, body, a, button, [role="button"], input, textarea, select, .pill, .showreel {
      cursor: none !important;
    }

    .cursor-dot, .cursor-ring {
      position: fixed;
      top: 0; left: 0;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 9999;
    }
    .cursor-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #F7E491;
      mix-blend-mode: normal;
    }
    .cursor-ring {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 1px solid #F7E491;
      transition: width .15s ease, height .15s ease, opacity .15s ease, transform .15s ease;
      opacity: .9;
    }
    .cursor-ring.is-hover {
      transform: translate(-50%, -50%) scale(1.15);
      opacity: 1;
    }
    /* top-right coords HUD */
    .coords{
      position: fixed;
      top: 14px;
      right: 18px;
      z-index: 9998;
      pointer-events: none;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
      color: rgba(247,228,145,.75);
      text-align: right;
      letter-spacing: .02em;
    }
    .coords b{ color: #F7E491; font-weight: 600; }
    @media (hover: none) {
      .cursor-dot, .cursor-ring { display: none !important; }
      html, body { cursor: auto !important; }
    }
    @media (prefers-reduced-motion: reduce){
      .cursor-ring { transition: none; }
    }

    /* Page load animations - Slide in from different directions */
    @keyframes slideDown {
      from {
        transform: translateY(-100px);
      }
      to {
        transform: translateY(0);
      }
    }

    @keyframes slideUp {
      from {
        transform: translateY(100px);
      }
      to {
        transform: translateY(0);
      }
    }

    @keyframes slideRight {
      from {
        transform: translateX(-100px);
      }
      to {
        transform: translateX(0);
      }
    }

    @keyframes slideLeft {
      from {
        transform: translateX(100px);
      }
      to {
        transform: translateX(0);
      }
    }

    /* Initially position elements off-screen */
    .showreel {
      transform: translateY(-100px);
    }

    .center {
      transform: translateX(-100px);
    }

    .bottom-left {
      transform: translateX(-100px) translateY(100px);
    }

    /* Animate in on load */
    .showreel.animate-in {
      animation: slideDown 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.1s forwards;
    }

    .center.animate-in {
      animation: slideRight 1s cubic-bezier(0.4, 0, 0.2, 1) 0.2s forwards;
    }

    .bottom-left.animate-in {
      animation: slideRight 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.4s forwards;
    }

    /* Page Transition Overlay */
    .page-transition {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg); /* Default to current page background */
      z-index: 99999;
      pointer-events: none;
      transform: translateY(100%);
      transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1),
                  background 0.1s ease;
    }
    
    /* Red background when transitioning to work.html */
    .page-transition.to-red {
      background: #ce4127;
    }
    
    /* Yellow background when transitioning to yellow pages */
    .page-transition.to-yellow {
      background: #F7E491;
    }

    .page-transition.to-dark {
      background: #060605;
    }

    .page-transition.is-active {
      transform: translateY(0);
      pointer-events: all;
    }

    .page-transition.is-exiting {
      transform: translateY(-100%);
    }

    /* Elements change color as overlay covers them */
    body.transitioning .showreel,
    body.transitioning .center,
    body.transitioning .bottom-left,
    body.transitioning .coords {
      transition: color 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                  fill 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                  stroke 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                  border-color 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body.transitioning .showreel *,
    body.transitioning .center *,
    body.transitioning .bottom-left *,
    body.transitioning .coords * {
      transition: color 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                  fill 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                  stroke 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                  border-color 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Prevent flash of unstyled content */
    body.page-loading {
      overflow: hidden;
    }
  </style>
</head>

  <script>
    // Page load animations
    (function() {
      const showreel = document.querySelector('.showreel');
      const center = document.querySelector('.center');
      const bottomLeft = document.querySelector('.bottom-left');
      
      // Trigger animations after page loads
      window.addEventListener('load', () => {
        if (showreel) showreel.classList.add('animate-in');
        if (center) center.classList.add('animate-in');

        const vh = video.videoHeight || 0;
        if (vw > 0 && vh > 0) {
          lastPreviewHeight = Math.round((PREVIEW_WIDTH * vh) / vw);
          preview.style.height = `${lastPreviewHeight}px`;
          // Reposition after height changes
          if (activeItem) positionPreviewOverName(activeItem);
        }
      });

      function hidePreview() {
        activeItem = null;
        video.pause();
        video.currentTime = 0;
        preview.classList.remove('is-visible');
      }

      // Keep preview aligned if the page moves (rare, but safe)
      window.addEventListener('scroll', () => {
        if (activeItem) positionPreviewOverName(activeItem);
      }, { passive: true });
      window.addEventListener('resize', () => {
        if (activeItem) positionPreviewOverName(activeItem);
      }, { passive: true });

      // Delegated hover so it works even when items are recycled/moved
      list.addEventListener('mouseover', (e) => {
        const item = e.target && e.target.closest ? e.target.closest('.project-item') : null;
        if (!item || !list.contains(item)) return;
        // Only trigger when entering the item (not moving between children)
        if (e.relatedTarget && item.contains(e.relatedTarget)) return;
        showPreview(item);
      });

      list.addEventListener('mouseout', (e) => {
        const item = e.target && e.target.closest ? e.target.closest('.project-item') : null;
        if (!item || !list.contains(item)) return;
        if (e.relatedTarget && item.contains(e.relatedTarget)) return;
        hidePreview();
      });
    })();

    // showreel demo
    document.getElementById('btn-showreel').addEventListener('click', (e) => {
      e.preventDefault();
      alert('Play show reel… (hook your video player here)');
    });

    /* -------- Custom cursor logic -------- */
    (function(){
      const dot  = document.getElementById('cursorDot');
      const ring = document.getElementById('cursorRing');

      if (!dot || !ring) return;

      let x = window.innerWidth / 2, y = window.innerHeight / 2;
      let rx = x, ry = y;
      const ease = 0.18;

      function move(e){
        x = e.clientX;
        y = e.clientY;
        dot.style.transform  = `translate(${x}px, ${y}px)`;
      }

      function tick(){
        rx += (x - rx) * ease;
        ry += (y - ry) * ease;
        ring.style.transform = `translate(${rx - 0}px, ${ry - 0}px) translate(-50%, -50%)`;
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);

      window.addEventListener('mousemove', move, {passive:true});

      // coords HUD
      (function(){
        const mx = document.getElementById('mx');
        const my = document.getElementById('my');
        if (!mx || !my) return;
        window.addEventListener('mousemove', (e) => {
          mx.textContent = Math.round(e.clientX);
          my.textContent = Math.round(e.clientY);
        }, { passive: true });
      })();

      function updateHover(e){
        const target = e.target.closest('a, button, [role="button"], .pill, .showreel, .project-link, input, select, textarea, label');
        ring.classList.toggle('is-hover', !!target);
      }
      window.addEventListener('mousemove', updateHover, {passive:true});

      window.addEventListener('mousedown', ()=> ring.style.opacity = '0.7');
      window.addEventListener('mouseup',   ()=> ring.style.opacity = '0.9');

      window.addEventListener('mouseleave', ()=> {
        dot.style.opacity = '0'; ring.style.opacity = '0';
      });
      window.addEventListener('mouseenter', ()=> {
        dot.style.opacity = '1'; ring.style.opacity = '0.9';
      });
    })();

    /* Set --vh to innerHeight for older Safari/Chrome on iOS */
    (function(){
      function setVh(){
        const vh = window.innerHeight * 0.01;
        document.documentElement.style.setProperty('--vh', `${vh}px`);
      }
      setVh();
      window.addEventListener('resize', setVh);
      window.addEventListener('orientationchange', setVh);
    })();

    /* Auto-refresh when crossing breakpoints (≤470, 471–520, ≥521) */
    (function(){
      const BUCKET_KEY = 'bp-bucket';
      const getBucket = () => {
        if (window.matchMedia('(max-width: 470px)').matches) return '≤470';
        if (window.matchMedia('(max-width: 520px)').matches) return '471-520';
        return '≥521';
      };

      // initialize stored bucket on first load
      const current = getBucket();
      try { sessionStorage.setItem(BUCKET_KEY, current); } catch(e){}

      let rafId = null;
      let pending = false;

      const onResize = () => {
        if (pending) return;
        pending = true;
        rafId && cancelAnimationFrame(rafId);
        // debounce with rAF then small timeout to wait for toolbar/URL bar settle
        rafId = requestAnimationFrame(() => {
          setTimeout(() => {
            pending = false;
            const now = getBucket();
            let prev = null;
            try { prev = sessionStorage.getItem(BUCKET_KEY); } catch(e){}
            if (now !== prev) {
              try { sessionStorage.setItem(BUCKET_KEY, now); } catch(e){}
              location.reload();
            }
          }, 180);
        });
      };

      // listen to both resize and orientation changes
      window.addEventListener('resize', onResize, {passive:true});
      window.addEventListener('orientationchange', onResize);
    })();

    /* Smooth scroll enhancement for anchor links */
    (function() {
      document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener('click', function (e) {
          const href = this.getAttribute('href');
          if (href === '#' || href === '#contact' || href === '#work') {
            e.preventDefault();
            const target = document.querySelector(href);
            if (target) {
              target.scrollIntoView({
                behavior: 'smooth',
                block: 'start'
              });
            }
          }
        });
      });
    })();

    /* Cutting-Edge Page Transitions */
    (function() {
      const transition = document.getElementById('pageTransition');
      if (!transition) return;

      // Check if page is loading
      if (document.readyState === 'loading') {
        document.body.classList.add('page-loading');
        window.addEventListener('load', () => {
          setTimeout(() => {
            document.body.classList.remove('page-loading');
            transition.classList.remove('is-active');
          }, 100);
        });
      } else {
        // Page already loaded, fade in transition
        setTimeout(() => {
          transition.classList.remove('is-active');
        }, 100);
      }

      // Intercept all internal navigation links
      document.querySelectorAll('a[href$=".html"], a[href*=".html?"]').forEach(link => {
        link.addEventListener('click', function(e) {
          const href = this.getAttribute('href');
          // Skip if it's an external link or has target="_blank"
          if (href.startsWith('http') || this.target === '_blank' || href.startsWith('mailto:')) {
            return;
          }

          e.preventDefault();
          
          // Page color mapping
          const pageColors = {
            'work.html': { bg: '#ce4127', text: '#F7E491' }, // Red page
            'index.html': { bg: '#F7E491', text: '#CE4127' }, // Yellow page
            'project.html': { bg: '#F7E491', text: '#CE4127' }, // Yellow page
            'About.html': { bg: '#ce4127', text: '#ffffff' },
            'contact.html': { bg: '#F7E491', text: '#CE4127' },
            'long-term.html': { bg: '#F7E491', text: '#CE4127' }
          };
          
          // Extract target page name
          const targetPage = href.split('/').pop().split('?')[0];
          const targetColor = pageColors[targetPage] || pageColors['index.html'];
          const isTargetRed = targetColor.bg === '#ce4127';
          const isTargetDark = targetColor.bg === '#060605';
          
          transition.classList.remove('to-red', 'to-yellow', 'to-dark');
          if (isTargetRed) {
            transition.classList.add('to-red');
          } else if (isTargetDark) {
            transition.classList.add('to-dark');
          } else {
            transition.classList.add('to-yellow');
          }
          
          // Add transitioning class
          document.body.classList.add('transitioning');
          
          // Function to update element colors based on overlay position
          function updateColors() {
            const overlayRect = transition.getBoundingClientRect();
            const overlayTop = overlayRect.top;
            
            // Elements to update
            const elements = document.querySelectorAll('.showreel, .center, .bottom-left, .coords, .showreel *, .center *, .bottom-left *, .coords *, svg path, .pill, .pill *, .project-item, .project-item *');
            
            elements.forEach(el => {
              const elRect = el.getBoundingClientRect();
              const elBottom = elRect.bottom;
              
              // If element is covered by overlay
              if (elBottom <= overlayTop + 5) {
                const computedStyle = window.getComputedStyle(el);
                
                // Change text color to target page's text color
                if (computedStyle.color && computedStyle.color !== 'rgba(0, 0, 0, 0)' && computedStyle.color !== 'transparent') {
                  el.style.color = targetColor.text;
                }
                
                // Change SVG fill
                if (el.tagName === 'path') {
                  el.style.fill = targetColor.text;
                }
                
                // Change border color
                if (computedStyle.borderColor && computedStyle.borderColor !== 'rgba(0, 0, 0, 0)' && computedStyle.borderColor !== 'transparent') {
                  el.style.borderColor = targetColor.text;
                }
                
                // Change outline color
                if (el.classList.contains('showreel') || el.closest('.showreel')) {
                  el.style.outlineColor = targetColor.text;
                }
              }
            });
          }
          
          // Update colors as overlay animates
          let animationFrameId;
          function animateColors() {
            if (transition.classList.contains('is-active')) {
              updateColors();
              animationFrameId = requestAnimationFrame(animateColors);
            } else {
              cancelAnimationFrame(animationFrameId);
            }
          }
          animateColors();
          
          // Show transition overlay (slide up from bottom)
          transition.classList.add('is-active');
          
          // Navigate after transition completes
          setTimeout(() => {
            window.location.href = href;
          }, 1000);
        });
      });

      // Handle browser back/forward buttons
      window.addEventListener('pageshow', (e) => {
        if (e.persisted) {
          // Page was loaded from cache
          transition.classList.remove('is-active');
        }
      });

      window.addEventListener('popstate', () => {
        transition.classList.add('is-active');
        setTimeout(() => {
          transition.classList.remove('is-active');
        }, 600);
      });
    })();
  </script>
</body>
